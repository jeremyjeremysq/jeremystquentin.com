<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeremy St Quentin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { cursor: none; }

    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #000;
    }

    a.video-link {
      display: block;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: fixed;
      top: 24px;
      left: 24px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.3;
      color: #000;
      z-index: 10;
      pointer-events: none;
    }

    .overlay a {
      display: inline;
      height: auto;
      color: #000;
      pointer-events: all;
    }

    .overlay a:hover {
      text-decoration: underline;
    }

    .overlay .row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #000;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="row">
      <div>Studio Jeremy St Quentin®</div>
      <div class="dot"></div>
      <div>Torquay, Australia.</div>
    </div>
    <div>Design &amp; Art Direction</div>
    <div>Website Soon</div>
    <div><a href="mailto:jeremy@jeremystquentin.com">Email Now →</a></div>
  </div>

  <a class="video-link" href="mailto:jeremy@jeremystquentin.com">
    <video autoplay muted loop playsinline preload="auto">
      <source src="landing.mp4" type="video/mp4" />
    </video>
  </a>
  <div id="cursor"></div>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
